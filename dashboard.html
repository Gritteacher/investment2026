<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentureClass | กระดานลงทุน</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 p-4 md:p-8 min-h-screen">

    <div class="max-w-5xl mx-auto space-y-8">

        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end bg-white p-6 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div>
                <h1 class="text-3xl font-semibold text-gray-900 mb-1">กระดานลงทุน</h1>
                <p class="text-gray-500 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                        </path>
                    </svg>
                    <span id="studentInfo">กำลังโหลดข้อมูลนักเรียน...</span>
                </p>
            </div>

            <div class="text-left md:text-right w-full md:w-auto bg-gray-50 p-4 rounded-xl border border-gray-100">
                <p class="text-sm text-gray-500 mb-1">งบประมาณคงเหลือ</p>
                <p class="text-3xl font-bold text-gray-900">
                    ฿ <span id="budgetAvailable">กำลังคำนวณ...</span>
                </p>
            </div>
        </header>

        <!-- Business List -->
        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-medium text-gray-800">ธุรกิจที่เปิดระดมทุน</h2>

                <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 transition">
                    ออกจากระบบ
                </button>
            </div>

            <div id="businessGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mb-4"></div>
                    <p class="text-gray-500">กำลังโหลดรายชื่อธุรกิจ...</p>
                </div>
            </div>
        </section>

        <!-- Investment History -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-medium text-gray-800 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z">
                    </path>
                </svg>
                ประวัติการลงทุนของคุณ
            </h2>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-sm border-b border-gray-200">
                            <th class="py-3 px-4 font-medium rounded-tl-xl">วัน-เวลาที่ลงทุน</th>
                            <th class="py-3 px-4 font-medium">ชื่อธุรกิจ</th>
                            <th class="py-3 px-4 font-medium text-right rounded-tr-xl">ยอดเงินลงทุน</th>
                        </tr>
                    </thead>

                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="3" class="py-8 text-center text-gray-400">
                                กำลังโหลดประวัติการลงทุน...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script>
        // ==============================
        // ตั้งค่า API Google Apps Script
        // ==============================
        const API_URL = "https://script.google.com/macros/s/AKfycby8G6xt7_oukBQlGTaQTwt6Lpnc0gNa4zT3ZgpC0RKmFpj8V59Io0G95FAEPDMLrjQf/exec";

        // ==============================
        // ตรวจสอบข้อมูลผู้ใช้จาก localStorage
        // ==============================
        const savedUser = localStorage.getItem('ventureUser');

        if (!savedUser) {
            Swal.fire({
                icon: 'warning',
                title: 'ยังไม่ได้เข้าสู่ระบบ',
                text: 'กรุณายืนยันตัวตนก่อนเข้าใช้งาน',
                confirmButtonColor: '#111827'
            }).then(() => {
                window.location.href = 'index.html';
            });

            throw new Error("Not logged in");
        }

        const currentUser = JSON.parse(savedUser);

        // วงเงินเริ่มต้นของนักเรียนแต่ละคน
        const INITIAL_BUDGET = 10000000;
        let currentBudget = INITIAL_BUDGET;

        // แสดงข้อมูลนักเรียน
        document.getElementById('studentInfo').innerText =
            `${currentUser.name} ${currentUser.surname} ม.${currentUser.class} เลขที่ ${currentUser.number}`;

        // ==============================
        // เริ่มโหลดข้อมูลหน้า Dashboard
        // ==============================
        async function initDashboard() {
            await Promise.all([
                loadBusinesses(),
                loadInvestmentHistory()
            ]);
        }

        // ==============================
        // โหลดรายชื่อธุรกิจตามห้องเรียน
        // ==============================
        async function loadBusinesses() {
            const grid = document.getElementById('businessGrid');

            grid.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mb-4"></div>
                    <p class="text-gray-500">กำลังโหลดรายชื่อธุรกิจ...</p>
                </div>
            `;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify({
                        action: "getBusinesses",
                        payload: {
                            class: currentUser.class
                        }
                    })
                });

                const result = await response.json();

                if (result.success) {
                    renderBusinesses(result.data);
                } else {
                    grid.innerHTML = `
                        <p class="col-span-full text-center text-red-500 py-8">
                            ${result.message || 'ดึงข้อมูลธุรกิจล้มเหลว'}
                        </p>
                    `;
                }

            } catch (error) {
                console.error("Error loading businesses:", error);

                grid.innerHTML = `
                    <p class="col-span-full text-center text-red-500 py-8">
                        เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย
                    </p>
                `;
            }
        }

        // ==============================
        // โหลดประวัติการลงทุน
        // จุดที่แก้แล้ว: เรียก renderHistoryTable(result.data)
        // ==============================
        async function loadInvestmentHistory() {
            const tbody = document.getElementById('historyTableBody');

            tbody.innerHTML = `
                <tr>
                    <td colspan="3" class="py-8 text-center text-gray-400">
                        กำลังโหลดประวัติการลงทุน...
                    </td>
                </tr>
            `;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify({
                        action: "getStudentInvestments",
                        payload: {
                            studentId: currentUser.studentId
                        }
                    })
                });

                const result = await response.json();

                if (result.success) {
                    const investments = result.data || [];

                    // คำนวณยอดเงินที่ลงทุนไปแล้วทั้งหมด
                    const totalInvested = investments.reduce((sum, item) => {
                        return sum + Number(item.amount || 0);
                    }, 0);

                    // คำนวณเงินคงเหลือ
                    currentBudget = INITIAL_BUDGET - totalInvested;

                    document.getElementById('budgetAvailable').innerText =
                        currentBudget.toLocaleString();

                    // สำคัญมาก: แสดงประวัติลงในตาราง
                    renderHistoryTable(investments);

                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="3" class="py-8 text-center text-red-500">
                                ${result.message || 'ดึงประวัติการลงทุนล้มเหลว'}
                            </td>
                        </tr>
                    `;
                }

            } catch (error) {
                console.error("Error loading investment history:", error);

                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" class="py-8 text-center text-red-500">
                            เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย
                        </td>
                    </tr>
                `;

                document.getElementById('budgetAvailable').innerText = "โหลดไม่สำเร็จ";
            }
        }

        // ==============================
        // แสดง Card ธุรกิจ
        // ==============================
        function renderBusinesses(businesses) {
            const grid = document.getElementById('businessGrid');
            grid.innerHTML = "";

            if (!businesses || businesses.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100">
                        <p class="text-gray-500 text-lg">
                            ยังไม่มีธุรกิจเปิดให้ลงทุนสำหรับห้อง ม.${currentUser.class} ในขณะนี้
                        </p>
                    </div>
                `;
                return;
            }

            businesses.forEach(business => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition">
                        <div>
                            <div class="inline-block px-3 py-1 bg-gray-100 text-gray-600 text-xs rounded-full mb-3">
                                ID: ${business.id}
                            </div>

                            <h3 class="text-xl font-semibold text-gray-900 leading-tight">
                                ${business.name}
                            </h3>

                            <p class="text-gray-500 text-sm mt-3 mb-6 line-clamp-3">
                                ${business.description}
                            </p>
                        </div>

                        <div class="mt-auto space-y-3">
                            <div class="relative">
                                <span class="absolute left-4 top-3 text-gray-500">฿</span>

                                <input
                                    type="number"
                                    id="amount-${business.id}"
                                    placeholder="ระบุยอดเงินลงทุน"
                                    class="w-full pl-8 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition"
                                >
                            </div>

                            <button
                                id="btn-${business.id}"
                                onclick="invest('${business.id}', '${escapeSingleQuote(business.name)}')"
                                class="w-full py-3 bg-gray-900 text-white font-medium rounded-xl hover:bg-gray-800 transition flex justify-center items-center">
                                ยืนยันการลงทุน
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // ==============================
        // แสดงตารางประวัติการลงทุน
        // ==============================
        function renderHistoryTable(investments) {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = "";

            if (!investments || investments.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" class="py-6 text-center text-gray-400 text-sm">
                            คุณยังไม่มีประวัติการลงทุนในขณะนี้
                        </td>
                    </tr>
                `;
                return;
            }

            investments.forEach(item => {
                const amount = Number(item.amount || 0);

                tbody.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition text-sm">
                        <td class="py-4 px-4 text-gray-500">
                            ${item.timestamp || '-'}
                        </td>

                        <td class="py-4 px-4 font-medium text-gray-900">
                            ${item.businessName || 'ไม่พบชื่อธุรกิจ'}
                        </td>

                        <td class="py-4 px-4 text-right font-semibold text-emerald-600">
                            ฿${amount.toLocaleString()}
                        </td>
                    </tr>
                `;
            });
        }

        // ==============================
        // ฟังก์ชันลงทุน
        // ==============================
        async function invest(businessId, businessName) {
            const amountInput = document.getElementById(`amount-${businessId}`);
            const btn = document.getElementById(`btn-${businessId}`);
            const amount = parseInt(amountInput.value, 10);

            if (!amount || amount <= 0) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ข้อมูลไม่ถูกต้อง',
                    text: 'กรุณาระบุจำนวนเงินที่ถูกต้อง มากกว่า 0',
                    confirmButtonColor: '#111827'
                });
                return;
            }

            if (amount > currentBudget) {
                Swal.fire({
                    icon: 'error',
                    title: 'ยอดเงินไม่เพียงพอ',
                    text: 'ยอดเงินลงทุนของคุณไม่เพียงพอ',
                    confirmButtonColor: '#111827'
                });
                return;
            }

            const confirmResult = await Swal.fire({
                title: 'ยืนยันการลงทุน?',
                text: `คุณต้องการลงทุนใน "${businessName}" จำนวน ฿${amount.toLocaleString()} ใช่หรือไม่?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#111827',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'ยืนยันการลงทุน',
                cancelButtonText: 'ยกเลิก'
            });

            if (!confirmResult.isConfirmed) {
                return;
            }

            amountInput.disabled = true;
            btn.disabled = true;
            btn.innerHTML = "กำลังดำเนินการ...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify({
                        action: "invest",
                        payload: {
                            studentId: currentUser.studentId,
                            businessId: businessId,
                            amount: amount
                        }
                    })
                });

                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงทุนสำเร็จ!',
                        text: `คุณได้ลงทุนใน ${businessName} เรียบร้อยแล้ว`,
                        confirmButtonColor: '#111827',
                        timer: 1500,
                        showConfirmButton: false
                    });

                    amountInput.value = "";

                    // โหลดประวัติและยอดคงเหลือใหม่ทันที
                    await loadInvestmentHistory();

                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'ผิดพลาด',
                        text: result.message || 'ไม่สามารถบันทึกการลงทุนได้',
                        confirmButtonColor: '#111827'
                    });
                }

            } catch (error) {
                console.error("Error investing:", error);

                Swal.fire({
                    icon: 'warning',
                    title: 'ข้อผิดพลาดเครือข่าย',
                    text: 'ไม่สามารถเชื่อมต่อกับระบบได้ กรุณาลองใหม่อีกครั้ง',
                    confirmButtonColor: '#111827'
                });

            } finally {
                amountInput.disabled = false;
                btn.disabled = false;
                btn.innerHTML = "ยืนยันการลงทุน";
            }
        }

        // ==============================
        // ออกจากระบบ
        // ==============================
        function logout() {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากระบบใช่หรือไม่?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('ventureUser');
                    window.location.href = 'index.html';
                }
            });
        }

        // ป้องกันชื่อธุรกิจที่มี ' แล้วทำให้ onclick พัง
        function escapeSingleQuote(text) {
            return String(text).replace(/'/g, "\\'");
        }

        // เริ่มทำงาน
        initDashboard();
    </script>

    <footer class="mt-10 pb-6 text-center">
    <div class="inline-block px-5 py-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
        <p class="text-sm text-gray-500">
            พัฒนาโดย <span class="font-medium text-gray-700">ครูกฤษณพล ทองอุ่น</span>
        </p>
        <p class="text-xs text-gray-400 mt-1">
            โรงเรียนเทพศิรินทร์นนทบุรี
        </p>
    </div>
</footer>
    
</body>
</html>

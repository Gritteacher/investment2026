<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentureClass | กระดานลงทุน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-4 md:p-8 min-h-screen">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div>
                <h1 class="text-3xl font-semibold text-gray-900 mb-1">กระดานลงทุน</h1>
                <p class="text-gray-500 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span id="studentInfo">กำลังโหลดข้อมูล...</span>
                </p>
            </div>
            <div class="text-left md:text-right w-full md:w-auto bg-gray-50 p-4 rounded-xl border border-gray-100">
                <p class="text-sm text-gray-500 mb-1">งบประมาณคงเหลือ</p>
                <p class="text-3xl font-bold text-gray-900">฿ <span id="budgetAvailable">...</span></p>
            </div>
        </header>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-medium text-gray-800">ธุรกิจที่เปิดระดมทุน</h2>
            <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 transition">ออกจากระบบ</button>
        </div>
        
        <div id="businessGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mb-4"></div>
                <p class="text-gray-500">กำลังโหลดรายชื่อธุรกิจ...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby8G6xt7_oukBQlGTaQTwt6Lpnc0gNa4zT3ZgpC0RKmFpj8V59Io0G95FAEPDMLrjQf/exec";
        
        const savedUser = localStorage.getItem('ventureUser');
        if(!savedUser) {
            Swal.fire({
                icon: 'warning',
                title: 'ยังไม่ได้เข้าสู่ระบบ',
                text: 'กรุณายืนยันตัวตนก่อนเข้าใช้งาน',
                confirmButtonColor: '#111827'
            }).then(() => {
                window.location.href = 'index.html';
            });
            throw new Error("Not logged in"); // หยุดสคริปต์ไม่ให้ทำงานต่อ
        }
        const currentUser = JSON.parse(savedUser);

        const INITIAL_BUDGET = 50000; 
        let currentBudget = localStorage.getItem(`budget_${currentUser.studentId}`);
        
        if(!currentBudget) {
            currentBudget = INITIAL_BUDGET;
            localStorage.setItem(`budget_${currentUser.studentId}`, currentBudget);
        } else {
            currentBudget = parseInt(currentBudget);
        }

        document.getElementById('studentInfo').innerText = `${currentUser.name} ${currentUser.surname} (ม.${currentUser.class} เลขที่ ${currentUser.number})`;
        updateBudgetDisplay();

        function updateBudgetDisplay() {
            document.getElementById('budgetAvailable').innerText = currentBudget.toLocaleString();
        }

        async function loadBusinesses() {
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "getBusinesses",
                        payload: { class: currentUser.class }
                    })
                });
                
                const result = await response.json();
                
                if(result.success) {
                    renderBusinesses(result.data);
                } else {
                    document.getElementById('businessGrid').innerHTML = `<p class="col-span-full text-center text-red-500 py-8">ไม่สามารถโหลดข้อมูลได้: ${result.message}</p>`;
                }
            } catch (error) {
                document.getElementById('businessGrid').innerHTML = `<p class="col-span-full text-center text-red-500 py-8">เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์</p>`;
            }
        }

        function renderBusinesses(businesses) {
            const grid = document.getElementById('businessGrid');
            grid.innerHTML = ""; 

            if(businesses.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100">
                        <p class="text-gray-500 text-lg">ยังไม่มีธุรกิจเปิดให้ลงทุนสำหรับห้อง ม.${currentUser.class} ในขณะนี้</p>
                    </div>`;
                return;
            }

            businesses.forEach(business => {
                const card = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition">
                        <div>
                            <div class="inline-block px-3 py-1 bg-gray-100 text-gray-600 text-xs rounded-full mb-3">ID: ${business.id}</div>
                            <h3 class="text-xl font-semibold text-gray-900 leading-tight">${business.name}</h3>
                            <p class="text-gray-500 text-sm mt-3 mb-6 line-clamp-3">${business.description}</p>
                        </div>
                        
                        <div class="mt-auto space-y-3">
                            <div class="relative">
                                <span class="absolute left-4 top-3 text-gray-500">฿</span>
                                <input type="number" id="amount-${business.id}" placeholder="ระบุยอดเงินลงทุน" class="w-full pl-8 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                            </div>
                            <button id="btn-${business.id}" onclick="invest('${business.id}', '${business.name}')" class="w-full py-3 bg-gray-900 text-white font-medium rounded-xl hover:bg-gray-800 transition flex justify-center items-center">
                                ยืนยันการลงทุน
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        async function invest(businessId, businessName) {
            const amountInput = document.getElementById(`amount-${businessId}`);
            const btn = document.getElementById(`btn-${businessId}`);
            const amount = parseInt(amountInput.value);

            if(!amount || amount <= 0) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ถูกต้อง', text: 'กรุณาระบุจำนวนเงินที่ถูกต้อง (มากกว่า 0)', confirmButtonColor: '#111827' });
                return;
            }

            if(amount > currentBudget) {
                Swal.fire({ icon: 'error', title: 'ยอดเงินไม่เพียงพอ', text: 'ยอดเงินลงทุนของคุณไม่เพียงพอ!', confirmButtonColor: '#111827' });
                return;
            }

            const confirmResult = await Swal.fire({
                title: 'ยืนยันการลงทุน?',
                text: `คุณต้องการลงทุนใน "${businessName}" จำนวน ฿${amount.toLocaleString()} ใช่หรือไม่?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#111827',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'ยืนยันการลงทุน',
                cancelButtonText: 'ยกเลิก'
            });

            if(!confirmResult.isConfirmed) return;

            amountInput.disabled = true;
            btn.disabled = true;
            btn.innerHTML = "กำลังดำเนินการ...";
            btn.classList.add('opacity-70');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "invest",
                        payload: {
                            studentId: currentUser.studentId,
                            businessId: businessId,
                            amount: amount
                        }
                    })
                });

                const result = await response.json();
                
                if(result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงทุนสำเร็จ!',
                        text: `คุณได้ลงทุนใน ${businessName} จำนวน ฿${amount.toLocaleString()}`,
                        confirmButtonColor: '#111827'
                    });
                    amountInput.value = ""; 
                    
                    currentBudget -= amount;
                    localStorage.setItem(`budget_${currentUser.studentId}`, currentBudget);
                    updateBudgetDisplay();
                } else {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: result.message, confirmButtonColor: '#111827' });
                }
            } catch (error) {
                Swal.fire({ icon: 'warning', title: 'ข้อผิดพลาดเครือข่าย', text: 'ไม่สามารถเชื่อมต่อกับระบบได้ กรุณาลองใหม่อีกครั้ง', confirmButtonColor: '#111827' });
            } finally {
                amountInput.disabled = false;
                btn.disabled = false;
                btn.innerHTML = "ยืนยันการลงทุน";
                btn.classList.remove('opacity-70');
            }
        }

        function logout() {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากระบบใช่หรือไม่?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'ออกจากระบบ',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('ventureUser');
                    window.location.href = 'index.html';
                }
            });
        }

        loadBusinesses();
    </script>
</body>
</html>

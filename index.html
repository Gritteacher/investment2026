<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentureClass | ระบบจำลองการลงทุน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex items-center justify-center min-h-screen p-4">
    
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold text-gray-900 mb-2">VentureClass</h1>
            <p class="text-gray-500">ตรวจสอบสิทธิ์และเข้าสู่ระบบนักลงทุน</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">รหัสนักเรียน</label>
                <input type="text" id="studentId" required placeholder="เช่น 12345" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">ชื่อจริง (ไม่ต้องใส่คำนำหน้า)</label>
                    <input type="text" id="name" required placeholder="สมชาย" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">นามสกุล</label>
                    <input type="text" id="surname" required placeholder="ใจดี" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition shadow-md mt-4 flex justify-center items-center">
                <span>ยืนยันตัวตนเข้าสู่ระบบ</span>
            </button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby8G6xt7_oukBQlGTaQTwt6Lpnc0gNa4zT3ZgpC0RKmFpj8V59Io0G95FAEPDMLrjQf/exec";

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = "กำลังตรวจสอบสิทธิ์...";
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            
            const payload = {
                studentId: document.getElementById('studentId').value,
                name: document.getElementById('name').value,
                surname: document.getElementById('surname').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "register",
                        payload: payload
                    })
                });

                const result = await response.json();
                
                if(result.success) {
                    localStorage.setItem('ventureUser', JSON.stringify(result.data));
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'สำเร็จ!',
                        text: result.message,
                        confirmButtonColor: '#111827',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                    
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'เข้าสู่ระบบไม่สำเร็จ',
                        text: result.message,
                        confirmButtonColor: '#111827'
                    });
                    resetButton();
                }
            } catch (error) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ข้อผิดพลาดเครือข่าย',
                    text: 'ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง',
                    confirmButtonColor: '#111827'
                });
                resetButton();
            }

            function resetButton() {
                submitBtn.innerHTML = "ยืนยันตัวตนเข้าสู่ระบบ";
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });
    </script>
</body>
</html>

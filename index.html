<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentureClass | ระบบจำลองการลงทุน</title>
    <!-- ใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ฟอนต์ภาษาไทย Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex items-center justify-center min-h-screen p-4">
    
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold text-gray-900 mb-2">VentureClass</h1>
            <p class="text-gray-500">ลงทะเบียนนักลงทุน (สำหรับนักเรียน)</p>
        </div>

        <form id="registerForm" class="space-y-4">
            
            <!-- รหัสนักเรียน -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">รหัสนักเรียน</label>
                <input type="text" id="studentId" required class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
            </div>

            <!-- ชื่อ และ นามสกุล -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">ชื่อจริง</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">นามสกุล</label>
                    <input type="text" id="surname" required class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                </div>
            </div>

            <!-- ห้องเรียน และ เลขที่ -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">ระดับชั้น</label>
                    <select id="class" required class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                        <option value="" disabled selected>เลือกห้อง</option>
                        <option value="6/1">ม.6/1</option>
                        <option value="6/2">ม.6/2</option>
                        <option value="6/3">ม.6/3</option>
                        <option value="6/4">ม.6/4</option>
                        <option value="6/5">ม.6/5</option>
                        <option value="6/6">ม.6/6</option>
                        <option value="6/7">ม.6/7</option>
                        <option value="6/8">ม.6/8</option>
                        <option value="6/9">ม.6/9</option>
                        <option value="6/10">ม.6/10</option>
                        <option value="6/11">ม.6/11</option>
                        <option value="6/12">ม.6/12</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">เลขที่</label>
                    <input type="number" id="number" required class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition shadow-md mt-4 flex justify-center items-center">
                <span>เข้าสู่ระบบการลงทุน</span>
            </button>
        </form>
    </div>

    <script>
        // ⚠️ นำ URL ของ Web App ที่ได้จาก Google Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้
        const API_URL = "วาง_URL_ของ_WEB_APP_ที่คัดลอกไว้ตรงนี้";

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = "กำลังเข้าสู่ระบบ...";
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            
            // รวบรวมข้อมูลที่นักเรียนกรอก
            const payload = {
                studentId: document.getElementById('studentId').value,
                prefix: "", // เว้นไว้เผื่อต้องการเพิ่มในอนาคต
                name: document.getElementById('name').value,
                surname: document.getElementById('surname').value,
                number: document.getElementById('number').value,
                class: document.getElementById('class').value
            };

            try {
                // ส่งข้อมูลไปบันทึกที่ Google Sheets
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: JSON.stringify({
                        action: "register",
                        payload: payload
                    })
                });

                const result = await response.json();
                
                if(result.success) {
                    // บันทึกข้อมูลนักเรียนไว้ในเบราว์เซอร์ เพื่อให้หน้า dashboard.html ดึงไปใช้ต่อได้
                    localStorage.setItem('ventureUser', JSON.stringify(payload));
                    
                    // เปลี่ยนหน้าไปที่กระดานลงทุน
                    window.location.href = 'dashboard.html';
                } else {
                    alert("เกิดข้อผิดพลาด: " + result.message);
                    resetButton();
                }
            } catch (error) {
                alert("ไม่สามารถเชื่อมต่อกับระบบได้ กรุณาลองใหม่อีกครั้ง");
                resetButton();
            }

            function resetButton() {
                submitBtn.innerHTML = "เข้าสู่ระบบการลงทุน";
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
            }
        });
    </script>
</body>
</html>
